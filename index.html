<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ConMaps</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #05070a;
      color: white;
    }

    #map {
      width: 100%;
      height: 100vh;
      z-index: 1;
    }

    .top-panel {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(980px, calc(100% - 24px));
      z-index: 999;
      background: rgba(10, 12, 18, 0.92);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.55);
      border-radius: 28px;
      padding: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 6px 12px;
      gap: 10px;
    }

    .logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #70a7ff;
    }

    .status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.62);
      text-align: right;
    }

    .search-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .field {
      position: relative;
    }

    .field input {
      width: 100%;
      height: 52px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      background: rgba(255, 255, 255, 0.075);
      color: white;
      outline: none;
      padding: 0 16px;
      font-size: 15px;
      transition: 0.2s ease;
    }

    .field input:focus {
      border-color: rgba(112, 167, 255, 0.85);
      background: rgba(255, 255, 255, 0.11);
    }

    .field input::placeholder {
      color: rgba(255, 255, 255, 0.48);
    }

    .suggestions {
      position: absolute;
      top: 58px;
      left: 0;
      right: 0;
      background: rgba(8, 10, 16, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 18px;
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
      display: none;
      z-index: 2000;
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.55);
    }

    .suggestion {
      padding: 13px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      transition: 0.15s ease;
    }

    .suggestion:hover {
      background: rgba(112, 167, 255, 0.14);
    }

    .suggestion-title {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 4px;
      color: white;
    }

    .suggestion-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.58);
      line-height: 1.35;
    }

    .use-location {
      color: #70a7ff;
      font-weight: 900;
    }

    .go-btn {
      height: 52px;
      padding: 0 26px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #4e8cff, #7c5cff);
      color: white;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .go-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(78, 140, 255, 0.35);
    }

    .go-btn:active {
      transform: scale(0.98);
    }

    .mode-row {
      display: flex;
      gap: 8px;
      padding: 12px 4px 2px;
    }

    .mode-btn {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.075);
      color: rgba(255, 255, 255, 0.8);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #4e8cff, #7c5cff);
      color: white;
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 10px 30px rgba(78, 140, 255, 0.22);
    }

    .info-panel {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: min(470px, calc(100% - 36px));
      max-height: 48vh;
      overflow: auto;
      background: rgba(10, 12, 18, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      z-index: 999;
      padding: 16px;
      display: none;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.5);
    }

    .info-panel h3 {
      font-size: 17px;
      margin-bottom: 12px;
    }

    .route-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.09);
    }

    .route-row:first-of-type {
      border-top: none;
    }

    .route-name {
      font-weight: 900;
      font-size: 14px;
    }

    .route-desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.58);
      margin-top: 3px;
    }

    .route-time {
      font-weight: 900;
      font-size: 15px;
      text-align: right;
      white-space: nowrap;
    }

    .directions-title {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.09);
      font-size: 14px;
      font-weight: 900;
    }

    .directions-list {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .direction-step {
      padding: 11px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.065);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .direction-main {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    .direction-meta {
      margin-top: 5px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
    }

    .street3d-panel {
      position: absolute;
      right: 18px;
      bottom: 18px;
      width: min(430px, calc(100% - 36px));
      height: 310px;
      z-index: 999;
      display: none;
      border-radius: 26px;
      overflow: hidden;
      background: radial-gradient(circle at top, rgba(78, 140, 255, 0.28), rgba(7, 9, 14, 0.96) 55%);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .street3d-head {
      position: absolute;
      top: 12px;
      left: 14px;
      right: 14px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .street3d-title {
      font-weight: 900;
      font-size: 14px;
    }

    .street3d-actions {
      display: flex;
      gap: 7px;
    }

    .small-btn {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.09);
      color: white;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .street3d-scene {
      position: absolute;
      inset: 0;
      perspective: 700px;
      overflow: hidden;
    }

    .sky-glow {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      height: 220px;
      background: radial-gradient(circle, rgba(112, 167, 255, 0.45), transparent 70%);
      filter: blur(10px);
    }

    .road-wrap {
      position: absolute;
      left: 50%;
      bottom: -45px;
      width: 260px;
      height: 420px;
      transform: translateX(-50%) rotateX(64deg);
      transform-origin: bottom;
    }

    .road {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, transparent 0 46%, rgba(255, 255, 255, 0.65) 47% 53%, transparent 54% 100%),
        linear-gradient(to bottom, #1d2330, #0e1119);
      clip-path: polygon(38% 0, 62% 0, 100% 100%, 0 100%);
      border-left: 2px solid rgba(255, 255, 255, 0.1);
      border-right: 2px solid rgba(255, 255, 255, 0.1);
    }

    .road::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 30px,
        rgba(255, 255, 255, 0.4) 31px,
        rgba(255, 255, 255, 0.4) 48px
      );
      opacity: 0.35;
      animation: roadMove 1.1s linear infinite;
    }

    @keyframes roadMove {
      from { transform: translateY(-50px); }
      to { transform: translateY(50px); }
    }

    .car-dot {
      position: absolute;
      left: 50%;
      bottom: 76px;
      transform: translateX(-50%);
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4e8cff, #7c5cff);
      box-shadow: 0 0 35px rgba(78, 140, 255, 0.65);
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }

    .building {
      position: absolute;
      bottom: 0;
      width: 44px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.04));
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 8px 8px 0 0;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
    }

    .b1 { left: 22px; height: 125px; }
    .b2 { left: 78px; height: 175px; }
    .b3 { right: 28px; height: 155px; }
    .b4 { right: 92px; height: 105px; }

    .street3d-info {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 18px;
      padding: 12px;
      z-index: 6;
    }

    .street3d-step {
      font-size: 13px;
      font-weight: 900;
      line-height: 1.35;
    }

    .street3d-meta {
      margin-top: 5px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.62);
    }

    .error-box {
      position: absolute;
      right: 18px;
      top: 150px;
      width: min(430px, calc(100% - 36px));
      z-index: 3000;
      background: rgba(255, 68, 68, 0.13);
      border: 1px solid rgba(255, 110, 110, 0.35);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 20px;
      padding: 14px;
      color: #ffd6d6;
      display: none;
      font-size: 13px;
      line-height: 1.4;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35) !important;
    }

    .leaflet-control-zoom a {
      background: rgba(10, 12, 18, 0.9) !important;
      color: white !important;
      border: 1px solid rgba(255, 255, 255, 0.11) !important;
    }

    @media (max-width: 760px) {
      .top-panel {
        top: 10px;
        border-radius: 22px;
      }

      .brand {
        padding-bottom: 10px;
      }

      .logo {
        font-size: 20px;
      }

      .status {
        display: none;
      }

      .search-grid {
        grid-template-columns: 1fr;
      }

      .go-btn {
        width: 100%;
      }

      .mode-row {
        overflow-x: auto;
      }

      .mode-btn {
        flex: 1;
      }

      .suggestions {
        position: absolute;
        top: 58px;
        left: 0;
        right: 0;
        max-height: 240px;
      }

      .info-panel {
        bottom: 12px;
        left: 12px;
        width: calc(100% - 24px);
        max-height: 38vh;
        border-radius: 20px;
      }

      .street3d-panel {
        right: 12px;
        left: 12px;
        bottom: calc(38vh + 24px);
        width: auto;
        height: 250px;
      }

      .error-box {
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 12px;
        width: auto;
      }
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <div class="top-panel">
    <div class="brand">
      <div class="logo">Con<span>Maps</span></div>
      <div class="status" id="statusText">Database mondiale OpenStreetMap</div>
    </div>

    <div class="search-grid">
      <div class="field">
        <input
          id="startInput"
          type="text"
          placeholder="Partenza"
          autocomplete="off"
        />
        <div class="suggestions" id="startSuggestions"></div>
      </div>

      <div class="field">
        <input
          id="endInput"
          type="text"
          placeholder="Arrivo"
          autocomplete="off"
        />
        <div class="suggestions" id="endSuggestions"></div>
      </div>

      <button class="go-btn" id="goBtn">Vai</button>
    </div>

    <div class="mode-row">
      <button class="mode-btn active" data-mode="drive">🚗 Auto</button>
      <button class="mode-btn" data-mode="walk">🚶 A piedi</button>
    </div>
  </div>

  <div class="info-panel" id="infoPanel">
    <h3>Risultati percorso</h3>

    <div class="route-row">
      <div>
        <div class="route-name" id="selectedModeName">🚗 Auto</div>
        <div class="route-desc" id="selectedDistance">Percorso più veloce</div>
      </div>
      <div class="route-time" id="selectedTime">--</div>
    </div>

    <div class="directions-title">Indicazioni</div>
    <div class="directions-list" id="directionsList"></div>
  </div>

  <div class="street3d-panel" id="street3dPanel">
    <div class="street3d-head">
      <div class="street3d-title">Vista 3D percorso</div>
      <div class="street3d-actions">
        <button class="small-btn" id="prevStepBtn">‹</button>
        <button class="small-btn" id="nextStepBtn">›</button>
      </div>
    </div>

    <div class="street3d-scene">
      <div class="sky-glow"></div>
      <div class="building b1"></div>
      <div class="building b2"></div>
      <div class="building b3"></div>
      <div class="building b4"></div>
      <div class="road-wrap">
        <div class="road"></div>
      </div>
      <div class="car-dot" id="vehicleIcon">🚗</div>
    </div>

    <div class="street3d-info">
      <div class="street3d-step" id="street3dStep">Percorso pronto</div>
      <div class="street3d-meta" id="street3dMeta">Segui le indicazioni</div>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <script>
    const GEOAPIFY_KEY = "c52bc1e58e1543acaf1233caae7f1bfa";

    const map = L.map("map", {
      zoomControl: true
    }).setView([41.9028, 12.4964], 6);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    const startInput = document.getElementById("startInput");
    const endInput = document.getElementById("endInput");
    const startSuggestions = document.getElementById("startSuggestions");
    const endSuggestions = document.getElementById("endSuggestions");
    const goBtn = document.getElementById("goBtn");
    const statusText = document.getElementById("statusText");
    const infoPanel = document.getElementById("infoPanel");
    const errorBox = document.getElementById("errorBox");

    const selectedModeName = document.getElementById("selectedModeName");
    const selectedDistance = document.getElementById("selectedDistance");
    const selectedTime = document.getElementById("selectedTime");
    const directionsList = document.getElementById("directionsList");

    const street3dPanel = document.getElementById("street3dPanel");
    const street3dStep = document.getElementById("street3dStep");
    const street3dMeta = document.getElementById("street3dMeta");
    const vehicleIcon = document.getElementById("vehicleIcon");
    const prevStepBtn = document.getElementById("prevStepBtn");
    const nextStepBtn = document.getElementById("nextStepBtn");

    let startPlace = null;
    let endPlace = null;
    let startMarker = null;
    let endMarker = null;
    let routeLine = null;
    let selectedMode = "drive";
    let currentSteps = [];
    let currentStepIndex = 0;

    function showError(message) {
      errorBox.innerText = message;
      errorBox.style.display = "block";

      setTimeout(function () {
        errorBox.style.display = "none";
      }, 9000);
    }

    function setStatus(text) {
      statusText.innerText = text;
    }

    function debounce(func, delay) {
      let timeout;

      return function (...args) {
        clearTimeout(timeout);

        timeout = setTimeout(function () {
          func.apply(this, args);
        }, delay);
      };
    }

    function formatMinutes(secondsOrMinutes, isSeconds) {
      let minutes = isSeconds ? secondsOrMinutes / 60 : secondsOrMinutes;

      if (!isFinite(minutes) || minutes <= 0) return "--";

      if (minutes < 60) {
        return Math.round(minutes) + " min";
      }

      const hours = Math.floor(minutes / 60);
      const mins = Math.round(minutes % 60);

      if (mins === 0) {
        return hours + " h";
      }

      return hours + " h " + mins + " min";
    }

    function formatKmFromMeters(meters) {
      if (!isFinite(meters)) return "--";

      if (meters < 1000) {
        return Math.round(meters) + " m";
      }

      return (meters / 1000).toFixed(1).replace(".", ",") + " km";
    }

    async function searchPlacesGeoapify(query) {
      if (!GEOAPIFY_KEY || GEOAPIFY_KEY === "INSERISCI_LA_TUA_API_KEY") {
        throw new Error("Devi inserire la tua API key Geoapify nel codice.");
      }

      const url =
        "https://api.geoapify.com/v1/geocode/autocomplete?" +
        new URLSearchParams({
          text: query.trim(),
          limit: "8",
          lang: "it",
          apiKey: GEOAPIFY_KEY
        }).toString();

      const response = await fetch(url);

      if (!response.ok) {
        throw new Error("Errore suggerimenti. Controlla la API key Geoapify.");
      }

      const data = await response.json();

      return (data.features || []).map(function (feature) {
        const p = feature.properties || {};
        const coords = feature.geometry.coordinates;

        return {
          title:
            p.name ||
            p.street ||
            p.city ||
            p.formatted ||
            "Luogo",
          subtitle:
            p.formatted ||
            [
              p.street,
              p.city,
              p.county,
              p.state,
              p.country
            ].filter(Boolean).join(", "),
          name:
            p.formatted ||
            [
              p.name,
              p.street,
              p.city,
              p.country
            ].filter(Boolean).join(", "),
          lat: coords[1],
          lon: coords[0],
          source: "Geoapify"
        };
      });
    }

    async function searchPlacesPhoton(query) {
      const url =
        "https://photon.komoot.io/api/?" +
        new URLSearchParams({
          q: query.trim(),
          limit: "8",
          lang: "it"
        }).toString();

      const response = await fetch(url);

      if (!response.ok) {
        throw new Error("Photon non risponde.");
      }

      const data = await response.json();

      return (data.features || []).map(function (feature) {
        const p = feature.properties || {};
        const coords = feature.geometry.coordinates;

        const title =
          p.name ||
          p.street ||
          p.city ||
          p.county ||
          p.state ||
          p.country ||
          "Luogo";

        const details = [
          p.housenumber && p.street ? p.street + " " + p.housenumber : null,
          !p.housenumber ? p.street : null,
          p.city,
          p.county,
          p.state,
          p.country
        ].filter(Boolean);

        const uniqueDetails = [...new Set(details)];

        return {
          title: title,
          subtitle: uniqueDetails.join(", "),
          name: [title, uniqueDetails.join(", ")].filter(Boolean).join(" — "),
          lat: coords[1],
          lon: coords[0],
          source: "Photon"
        };
      });
    }

    async function searchPlacesNominatimOnce(query) {
      const url =
        "https://nominatim.openstreetmap.org/search?" +
        new URLSearchParams({
          q: query.trim(),
          format: "jsonv2",
          addressdetails: "1",
          limit: "1",
          accept_language: "it"
        }).toString();

      const response = await fetch(url, {
        headers: {
          "Accept": "application/json"
        }
      });

      if (!response.ok) {
        throw new Error("Nominatim non risponde.");
      }

      const data = await response.json();

      if (!data || !data.length) return [];

      return data.map(function (place) {
        return {
          title: place.name || place.display_name || "Luogo",
          subtitle: place.display_name || "",
          name: place.display_name || place.name || "Luogo",
          lat: parseFloat(place.lat),
          lon: parseFloat(place.lon),
          source: "Nominatim"
        };
      });
    }

    async function searchPlaces(query) {
      if (!query || query.trim().length < 2) {
        return [];
      }

      const cleanQuery = query.trim();

      try {
        return await searchPlacesGeoapify(cleanQuery);
      } catch (geoapifyError) {
        try {
          const photonResults = await searchPlacesPhoton(cleanQuery);

          if (photonResults.length) {
            return photonResults;
          }
        } catch (photonError) {}

        try {
          const nominatimResults = await searchPlacesNominatimOnce(cleanQuery);

          if (nominatimResults.length) {
            return nominatimResults;
          }
        } catch (nominatimError) {}

        throw geoapifyError;
      }
    }

    function renderSuggestions(results, box, input, type) {
      box.innerHTML = "";

      if (type === "start") {
        const locationItem = document.createElement("div");
        locationItem.className = "suggestion";

        locationItem.innerHTML = `
          <div class="suggestion-title use-location">📍 Usa posizione attuale</div>
          <div class="suggestion-sub">Clicca qui: il browser chiederà il permesso GPS</div>
        `;

        locationItem.addEventListener("mousedown", function (event) {
          event.preventDefault();
          event.stopPropagation();
          box.style.display = "none";
          useCurrentLocation();
        });

        locationItem.addEventListener("touchstart", function (event) {
          event.preventDefault();
          event.stopPropagation();
          box.style.display = "none";
          useCurrentLocation();
        });

        box.appendChild(locationItem);
      }

      if (!results.length) {
        const emptyItem = document.createElement("div");
        emptyItem.className = "suggestion";

        emptyItem.innerHTML = `
          <div class="suggestion-title">Nessun suggerimento</div>
          <div class="suggestion-sub">Controlla la connessione, la API key o scrivi meglio il luogo</div>
        `;

        box.appendChild(emptyItem);
        box.style.display = "block";
        return;
      }

      results.forEach(function (place) {
        const item = document.createElement("div");
        item.className = "suggestion";

        item.innerHTML = `
          <div class="suggestion-title">${place.title}</div>
          <div class="suggestion-sub">${place.subtitle || place.name}</div>
        `;

        item.addEventListener("mousedown", function (event) {
          event.preventDefault();
          event.stopPropagation();
          selectPlace(place, input, box, type);
        });

        item.addEventListener("touchstart", function (event) {
          event.preventDefault();
          event.stopPropagation();
          selectPlace(place, input, box, type);
        });

        box.appendChild(item);
      });

      box.style.display = "block";
    }

    function selectPlace(place, input, box, type) {
      if (type === "start") {
        startPlace = place;
        input.value = place.name;
        setMarker("start", place);
        endInput.focus();
      } else {
        endPlace = place;
        input.value = place.name;
        setMarker("end", place);
      }

      box.style.display = "none";
    }

    const handleStartSearch = debounce(async function () {
      const query = startInput.value.trim();

      if (query.length < 2) {
        renderSuggestions([], startSuggestions, startInput, "start");
        return;
      }

      startSuggestions.innerHTML = `
        <div class="suggestion">
          <div class="suggestion-title">Cerco...</div>
          <div class="suggestion-sub">Ricerca nel database mondiale</div>
        </div>
      `;

      startSuggestions.style.display = "block";

      try {
        const results = await searchPlaces(query);
        renderSuggestions(results, startSuggestions, startInput, "start");
      } catch (err) {
        showError(err.message || "Errore durante la ricerca della partenza.");
        renderSuggestions([], startSuggestions, startInput, "start");
      }
    }, 350);

    const handleEndSearch = debounce(async function () {
      const query = endInput.value.trim();

      if (query.length < 2) {
        endSuggestions.style.display = "none";
        return;
      }

      endSuggestions.innerHTML = `
        <div class="suggestion">
          <div class="suggestion-title">Cerco...</div>
          <div class="suggestion-sub">Ricerca nel database mondiale</div>
        </div>
      `;

      endSuggestions.style.display = "block";

      try {
        const results = await searchPlaces(query);
        renderSuggestions(results, endSuggestions, endInput, "end");
      } catch (err) {
        showError(err.message || "Errore durante la ricerca dell’arrivo.");
        renderSuggestions([], endSuggestions, endInput, "end");
      }
    }, 350);

    startInput.addEventListener("input", function () {
      startPlace = null;
      handleStartSearch();
    });

    endInput.addEventListener("input", function () {
      endPlace = null;
      handleEndSearch();
    });

    startInput.addEventListener("focus", function () {
      if (startInput.value.trim().length >= 2) {
        handleStartSearch();
      } else {
        renderSuggestions([], startSuggestions, startInput, "start");
      }
    });

    endInput.addEventListener("focus", function () {
      if (endInput.value.trim().length >= 2) {
        handleEndSearch();
      }
    });

    document.addEventListener("mousedown", function (event) {
      if (!startInput.contains(event.target) && !startSuggestions.contains(event.target)) {
        startSuggestions.style.display = "none";
      }

      if (!endInput.contains(event.target) && !endSuggestions.contains(event.target)) {
        endSuggestions.style.display = "none";
      }
    });

    document.addEventListener("touchstart", function (event) {
      if (!startInput.contains(event.target) && !startSuggestions.contains(event.target)) {
        startSuggestions.style.display = "none";
      }

      if (!endInput.contains(event.target) && !endSuggestions.contains(event.target)) {
        endSuggestions.style.display = "none";
      }
    });

    function setMarker(type, place) {
      const markerIcon = L.divIcon({
        html: type === "start" ? "📍" : "🏁",
        className: "",
        iconSize: [28, 28],
        iconAnchor: [14, 28]
      });

      if (type === "start") {
        if (startMarker) {
          map.removeLayer(startMarker);
        }

        startMarker = L.marker([place.lat, place.lon], {
          icon: markerIcon
        }).addTo(map).bindPopup("Partenza<br>" + place.name);
      } else {
        if (endMarker) {
          map.removeLayer(endMarker);
        }

        endMarker = L.marker([place.lat, place.lon], {
          icon: markerIcon
        }).addTo(map).bindPopup("Arrivo<br>" + place.name);
      }

      const points = [];

      if (startPlace) points.push([startPlace.lat, startPlace.lon]);
      if (endPlace) points.push([endPlace.lat, endPlace.lon]);

      if (points.length === 1) {
        map.setView(points[0], 13);
      }

      if (points.length === 2) {
        map.fitBounds(points, {
          padding: [80, 80]
        });
      }
    }

    function useCurrentLocation() {
      if (!window.isSecureContext) {
        showError("La posizione funziona solo su HTTPS o localhost. Carica il sito su Netlify, Vercel o GitHub Pages.");
        return;
      }

      if (!navigator.geolocation) {
        showError("Il tuo dispositivo non supporta la posizione attuale.");
        return;
      }

      setStatus("Richiesta posizione in corso...");

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          startPlace = {
            title: "Posizione attuale",
            subtitle: "GPS dispositivo",
            name: "Posizione attuale",
            lat: lat,
            lon: lon,
            source: "GPS"
          };

          startInput.value = "Posizione attuale";
          setMarker("start", startPlace);
          setStatus("Posizione trovata");
          endInput.focus();
        },
        function (error) {
          let message = "Posizione non disponibile.";

          if (error.code === 1) {
            message = "Permesso posizione negato. Devi consentire la posizione dal browser.";
          }

          if (error.code === 2) {
            message = "Il dispositivo non riesce a trovare la posizione.";
          }

          if (error.code === 3) {
            message = "La richiesta posizione è scaduta. Riprova.";
          }

          showError(message);
          setStatus("Errore posizione");
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    async function geocodeManualInput(text) {
      const results = await searchPlaces(text);

      if (!results.length) {
        return null;
      }

      return results[0];
    }

    async function ensurePlacesSelected() {
      if (!startPlace) {
        const text = startInput.value.trim();

        if (text.length < 2) {
          throw new Error("Inserisci una partenza.");
        }

        setStatus("Cerco la partenza...");

        const found = await geocodeManualInput(text);

        if (!found) {
          throw new Error("Non ho trovato la partenza.");
        }

        startPlace = found;
        startInput.value = found.name;
        setMarker("start", startPlace);
      }

      if (!endPlace) {
        const text = endInput.value.trim();

        if (text.length < 2) {
          throw new Error("Inserisci un arrivo.");
        }

        setStatus("Cerco l’arrivo...");

        const found = await geocodeManualInput(text);

        if (!found) {
          throw new Error("Non ho trovato l’arrivo.");
        }

        endPlace = found;
        endInput.value = found.name;
        setMarker("end", endPlace);
      }
    }

    async function calculateGeoapifyRoute() {
      const waypoints =
        startPlace.lat + "," + startPlace.lon + "|" +
        endPlace.lat + "," + endPlace.lon;

      const url =
        "https://api.geoapify.com/v1/routing?" +
        new URLSearchParams({
          waypoints: waypoints,
          mode: selectedMode,
          lang: "it",
          details: "instruction_details",
          apiKey: GEOAPIFY_KEY
        }).toString();

      const response = await fetch(url);

      if (!response.ok) {
        throw new Error("Errore nel calcolo del percorso. Controlla la API key Geoapify.");
      }

      const data = await response.json();

      if (!data.features || !data.features.length) {
        throw new Error("Percorso non trovato.");
      }

      return data.features[0];
    }

    function flattenCoordinates(geometry) {
      if (!geometry || !geometry.coordinates) return [];

      if (geometry.type === "LineString") {
        return geometry.coordinates.map(function (coord) {
          return [coord[1], coord[0]];
        });
      }

      if (geometry.type === "MultiLineString") {
        const points = [];

        geometry.coordinates.forEach(function (line) {
          line.forEach(function (coord) {
            points.push([coord[1], coord[0]]);
          });
        });

        return points;
      }

      return [];
    }

    function drawRoute(routeFeature) {
      if (routeLine) {
        map.removeLayer(routeLine);
      }

      const coordinates = flattenCoordinates(routeFeature.geometry);

      if (!coordinates.length) {
        throw new Error("La geometria del percorso non è valida.");
      }

      routeLine = L.polyline(coordinates, {
        color: selectedMode === "drive" ? "#4e8cff" : "#54e38e",
        weight: 6,
        opacity: 0.92
      }).addTo(map);

      map.fitBounds(routeLine.getBounds(), {
        padding: [90, 90]
      });
    }

    function extractDirections(routeFeature) {
      const props = routeFeature.properties || {};
      const legs = props.legs || [];
      const steps = [];

      legs.forEach(function (leg) {
        const legSteps = leg.steps || [];

        legSteps.forEach(function (step) {
          let instructionText = "Prosegui";

          if (step.instruction && typeof step.instruction === "object") {
            instructionText =
              step.instruction.text ||
              step.instruction.description ||
              step.instruction.type ||
              "Prosegui";
          } else if (typeof step.instruction === "string") {
            instructionText = step.instruction;
          } else if (step.name) {
            instructionText = "Prosegui su " + step.name;
          }

          steps.push({
            text: instructionText,
            distance: step.distance || 0,
            time: step.time || 0,
            road: step.name || ""
          });
        });
      });

      if (!steps.length) {
        steps.push({
          text: "Segui il percorso evidenziato sulla mappa fino alla destinazione.",
          distance: props.distance || 0,
          time: props.time || 0,
          road: ""
        });
      }

      return steps;
    }

    function renderDirections(steps) {
      directionsList.innerHTML = "";

      steps.forEach(function (step, index) {
        const item = document.createElement("div");
        item.className = "direction-step";

        item.innerHTML = `
          <div class="direction-main">${index + 1}. ${step.text}</div>
          <div class="direction-meta">
            ${formatKmFromMeters(step.distance)} • ${formatMinutes(step.time, true)}
          </div>
        `;

        item.addEventListener("click", function () {
          currentStepIndex = index;
          update3DStep();
        });

        directionsList.appendChild(item);
      });
    }

    function update3DStep() {
      if (!currentSteps.length) {
        street3dStep.innerText = "Percorso pronto";
        street3dMeta.innerText = "Segui le indicazioni";
        return;
      }

      const step = currentSteps[currentStepIndex];

      street3dStep.innerText = step.text;
      street3dMeta.innerText =
        "Passaggio " +
        (currentStepIndex + 1) +
        " di " +
        currentSteps.length +
        " • " +
        formatKmFromMeters(step.distance) +
        " • " +
        formatMinutes(step.time, true);

      vehicleIcon.innerText = selectedMode === "drive" ? "🚗" : "🚶";
    }

    prevStepBtn.addEventListener("click", function () {
      if (!currentSteps.length) return;

      currentStepIndex--;

      if (currentStepIndex < 0) {
        currentStepIndex = currentSteps.length - 1;
      }

      update3DStep();
    });

    nextStepBtn.addEventListener("click", function () {
      if (!currentSteps.length) return;

      currentStepIndex++;

      if (currentStepIndex >= currentSteps.length) {
        currentStepIndex = 0;
      }

      update3DStep();
    });

    document.querySelectorAll(".mode-btn").forEach(function (button) {
      button.addEventListener("click", function () {
        document.querySelectorAll(".mode-btn").forEach(function (btn) {
          btn.classList.remove("active");
        });

        button.classList.add("active");
        selectedMode = button.dataset.mode;

        setStatus(selectedMode === "drive" ? "Modalità auto selezionata" : "Modalità a piedi selezionata");

        if (startPlace && endPlace) {
          calculateRoute();
        }
      });
    });

    async function calculateRoute() {
      try {
        goBtn.classList.add("loading");
        goBtn.innerText = "Calcolo...";
        setStatus("Calcolo percorso...");

        await ensurePlacesSelected();

        const routeFeature = await calculateGeoapifyRoute();

        drawRoute(routeFeature);

        const props = routeFeature.properties || {};
        const routeDistance = props.distance || 0;
        const routeTime = props.time || 0;

        currentSteps = extractDirections(routeFeature);
        currentStepIndex = 0;

        selectedModeName.innerText = selectedMode === "drive" ? "🚗 Auto" : "🚶 A piedi";
        selectedDistance.innerText = "Distanza: " + formatKmFromMeters(routeDistance);
        selectedTime.innerText = formatMinutes(routeTime, true);

        renderDirections(currentSteps);
        update3DStep();

        infoPanel.style.display = "block";
        street3dPanel.style.display = "block";

        setStatus("Percorso pronto");
      } catch (err) {
        showError(err.message || "Errore durante il calcolo.");
        setStatus("Errore");
      } finally {
        goBtn.classList.remove("loading");
        goBtn.innerText = "Vai";
      }
    }

    goBtn.addEventListener("click", calculateRoute);

    startInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        endInput.focus();
      }
    });

    endInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        calculateRoute();
      }
    });
  </script>
</body>
</html>
